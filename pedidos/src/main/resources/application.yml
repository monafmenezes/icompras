spring:
  application:
    name: pedidos
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5555}/${DB_NAME:icompraspedidos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_PEDIDOS:icompras-atualizacao-pedido}
      auto-offset-reset: earliest

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

icompras:
  pedidos:
    clients:
      produtos:
        url: ${PRODUTOS_SERVICE_URL:http://localhost:8081/produtos}
      clientes:
        url: ${CLIENTES_SERVICE_URL:http://localhost:8082/clientes}
  config:
    kafka:
      server-url: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
      topics:
        pedidos-pagos: ${TOPIC_PEDIDOS_PAGOS:icompras.pedidos-pagos}
        pedidos-faturados: ${TOPIC_PEDIDOS_FATURADOS:icompras.pedidos-faturados}
        pedidos-enviados: ${TOPIC_PEDIDOS_ENVIADOS:icompras.pedidos-enviados}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.monalisamenezes.icompras: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:icompraspedidos}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

icompras:
  pedidos:
    clients:
      produtos:
        url: ${PRODUTOS_SERVICE_URL:http://produtos:8081/produtos}
      clientes:
        url: ${CLIENTES_SERVICE_URL:http://clientes:8082/clientes}
  config:
    kafka:
      server-url: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
