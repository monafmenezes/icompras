spring:
  application:
    name: faturamento
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: 'http://localhost:29092'
    consumer:
      group-id: icompras-faturamento
      auto-offset-reset: earliest

icompras:
  config:
    kafka:
      topic:
        pedidos-pagos: 'icompras.pedidos-pagos'
        pedidos-faturados: 'icompras.pedidos-faturados'

server:
  port: 8083

minio:
  url: 'http://localhost:9000'
  access-key: ${ACCESS_KEY:admin}
  secret-key: ${SECRET_KEY:password123}
  bucket-name: icompras.faturas



