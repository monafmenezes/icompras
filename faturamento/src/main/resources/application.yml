spring:
  application:
    name: faturamento
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_FATURAMENTO:icompras-faturamento}
      auto-offset-reset: earliest

icompras:
  config:
    kafka:
      topic:
        pedidos-pagos: ${TOPIC_PEDIDOS_PAGOS:icompras.pedidos-pagos}
        pedidos-faturados: ${TOPIC_PEDIDOS_FATURADOS:icompras.pedidos-faturados}

server:
  port: ${SERVER_PORT:8083}
  error:
    include-message: always
    include-binding-errors: always

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:password123}
  bucket-name: ${MINIO_BUCKET_NAME:icompras.faturas}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.monalisamenezes.icompras: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

minio:
  url: ${MINIO_URL:http://minio:9000}
